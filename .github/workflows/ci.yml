name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Both jobs run in parallel — no need to wait for each other
jobs:

  # ──────────────────────────────────────────────
  # Backend: lint (ruff) + Docker build validation
  # ──────────────────────────────────────────────
  backend:
    name: Backend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Frontend: lint (eslint) + type-check + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint with ESLint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build Next.js app
        run: npm run build
        env:
          # Provide a dummy URL so the build doesn't fail on missing env vars
          NEXT_PUBLIC_API_URL: http://localhost:8000
